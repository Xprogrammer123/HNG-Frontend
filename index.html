<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <article data-testid="test-todo-card" class="card">
      <section class="card__hero">
        <header class="card__hero-header">
          <span data-testid="test-todo-priority" class="priority-badge priority-high">High</span>
          <div class="card__icon">
            <svg height="20" width="20" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" stroke-linejoin="round" stroke-linecap="round"></path>
            </svg>
          </div>
        </header>
        <h2 data-testid="test-todo-title" class="card__job-title">Design System Review</h2>
      </section>
      
      <p data-testid="test-todo-description" class="card__description">
        Review the new design system components and provide feedback on accessibility and consistency across the design tokens.
      </p>
      
      <div class="card__meta">
        <div class="card__meta-item">
          <time data-testid="test-todo-due-date" class="due-date" datetime="2026-03-01T18:00:00Z">
            Mar 1, 2026
          </time>
        </div>
        <span data-testid="test-todo-time-remaining" class="time-remaining" aria-live="polite">
          Due in 20 days
        </span>
      </div>
      
      <ul data-testid="test-todo-tags" class="card__tags" role="list">
        <li>
          <span data-testid="test-todo-tag-work" class="tag tag-work">work</span>
        </li>
        <li>
          <span data-testid="test-todo-tag-urgent" class="tag tag-urgent">urgent</span>
        </li>
        <li>
          <span class="tag tag-design">design</span>
        </li>
      </ul>
      
      <footer class="card__footer">
       
        
        <div class="card__actions">
          <label class="todo-complete-label">
            <input 
              type="checkbox" 
              data-testid="test-todo-complete-toggle" 
              class="todo-complete-toggle"
              aria-label="Mark task as complete"
            >
            <span class="todo-complete-text">Complete</span>
          </label>
          
          <button data-testid="test-todo-edit-button" class="card__btn card__btn--edit" aria-label="Edit task">Edit</button>
          <button data-testid="test-todo-delete-button" class="card__btn card__btn--delete" aria-label="Delete task">Delete</button>
        </div>
      </footer>
    </article>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
