<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <article data-testid="test-todo-card" class="todo-card">
      <div class="todo-header">
        <h2 data-testid="test-todo-title" class="todo-title">Design System Review</h2>
        <div class="todo-meta">
          <span data-testid="test-todo-priority" class="priority-badge priority-high" aria-label="Priority: High">High</span>
          <span data-testid="test-todo-status" class="status-badge status-pending" aria-label="Status: Pending">Pending</span>
        </div>
      </div>
      
      <p data-testid="test-todo-description" class="todo-description">
        Review the new design system components and provide feedback on accessibility and consistency across the design tokens.
      </p>
      
      <div class="todo-due-section">
        <time data-testid="test-todo-due-date" class="due-date" datetime="2026-03-01T18:00:00Z">
          Due Mar 1, 2026
        </time>
        <span data-testid="test-todo-time-remaining" class="time-remaining" aria-live="polite">
          Due in 20 days
        </span>
      </div>
      
      <ul data-testid="test-todo-tags" class="todo-tags" role="list">
        <li>
          <span data-testid="test-todo-tag-work" class="tag tag-work">work</span>
        </li>
        <li>
          <span data-testid="test-todo-tag-urgent" class="tag tag-urgent">urgent</span>
        </li>
        <li>
          <span class="tag tag-design">design</span>
        </li>
      </ul>
      
      <div class="todo-actions">
        <label class="todo-complete-label">
          <input 
            type="checkbox" 
            data-testid="test-todo-complete-toggle" 
            class="todo-complete-toggle"
            aria-label="Mark task as complete"
          >
          <span class="todo-complete-text">Complete</span>
        </label>
        
        <button data-testid="test-todo-edit-button" class="action-btn edit-btn" aria-label="Edit task">
          Edit
        </button>
        <button data-testid="test-todo-delete-button" class="action-btn delete-btn" aria-label="Delete task">
          Delete
        </button>
      </div>
    </article>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
